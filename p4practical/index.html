<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacob’s Tech Products</title>
  <meta name="description" content="Explore headphones, mouse, and keyboard products with interactive modals and a contact form.">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- Navigation -->
<header class="bg-gray-800 text-white p-4 fixed w-full top-0">
  <nav class="flex space-x-4 justify-center">
    <a href="C:\Users\Jacob\OneDrive\Desktop\p4practical\index.html" class="hover:underline">Home</a>
    <a href="C:\Users\Jacob\OneDrive\Desktop\p4practical\about.html" class="hover:underline">About</a>
    <a href="C:\Users\Jacob\OneDrive\Desktop\p4practical\contact.html" class="hover:underline">Contact</a>
  </nav>
</header>

<!-- Home Section -->
<section id="home" class="h-screen flex items-center justify-center bg-gray-200">
  <h1 id="greeting" class="text-4xl font-bold"></h1>
</section>


<!-- Modals -->
<div id="headphonesModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-6">
    <h3 class="text-xl font-bold mb-4">Headphones</h3>
    <img src="C:\Users\Jacob\OneDrive\Desktop\p4practical\images\headphones.jpg" alt="High-quality headphones" class="w-full h-48 object-cover mb-4">
    <p class="text-gray-700 mb-4">These headphones deliver crystal-clear sound quality with noise cancellation.</p>
    <div class="flex justify-end space-x-2">
      <button class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">Buy Now</button>
      <button onclick="closeModal('headphonesModal')" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Close</button>
    </div>
  </div>
</div>

<div id="mouseModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-6">
    <h3 class="text-xl font-bold mb-4">Mouse</h3>
    <img src="C:\Users\Jacob\OneDrive\Desktop\p4practical\images\mouse.jpg" alt="Ergonomic mouse" class="w-full h-48 object-cover mb-4">
    <p class="text-gray-700 mb-4">This mouse offers precision tracking and ergonomic design.</p>
    <div class="flex justify-end space-x-2">
      <button class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">Buy Now</button>
      <button onclick="closeModal('mouseModal')" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Close</button>
    </div>
  </div>
</div>

<div id="keyboardModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
  <div class="bg-white rounded-lg shadow-lg max-w-md w-full p-6">
    <h3 class="text-xl font-bold mb-4">Keyboard</h3>
    <img src="C:\Users\Jacob\OneDrive\Desktop\p4practical\images\keyboard.jpg" alt="Mechanical keyboard" class="w-full h-48 object-cover mb-4">
    <p class="text-gray-700 mb-4">This keyboard features mechanical switches and customizable backlighting.</p>
    <div class="flex justify-end space-x-2">
      <button class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600">Buy Now</button>
      <button onclick="closeModal('keyboardModal')" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Close</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script>
  function openModal(id) {
    document.getElementById(id).classList.remove('hidden');
    document.getElementById(id).classList.add('flex');
  }
  function closeModal(id) {
    document.getElementById(id).classList.add('hidden');
    document.getElementById(id).classList.remove('flex');
  }
  function validateForm() {
    let name = document.forms["contactForm"]["name"].value;
    let email = document.forms["contactForm"]["email"].value;
    let message = document.forms["contactForm"]["message"].value;
    if (name === "" || email === "" || message === "") {
      alert("Please fill out all fields!");
      return false;
    }
    return true;
  }
  // Dynamic greeting
  window.onload = function() {
    let greetingElement = document.getElementById("greeting");
    if (greetingElement) {
      let hour = new Date().getHours();
      let greeting;
      if (hour < 12) {
        greeting = "Good morning!";
      } else if (hour < 18) {
        greeting = "Good afternoon!";
      } else {
        greeting = "Good evening!";
      }
      greetingElement.textContent = greeting;
    }
  };
</script>

</body>
</html>
